---
- name: Configure server for sharpr.me application
  hosts: all
  become: true
  vars:
    ansible_python_interpreter: /usr/bin/python3.10
  tasks:
    - name: Create docker daemon configuration
      copy:
        content: |
          {
            "iptables": false
          }
        dest: /etc/docker/daemon.json
        mode: '0644'

    - name: Restart Docker service
      systemd:
        name: docker
        state: restarted

    - name: Create UFW configuration script
      copy:
        content: |
          #!/bin/bash

          # Create temporary files for new IP ranges
          curl -s https://www.cloudflare.com/ips-v4 -o /tmp/cloudflare-ips-v4.new.txt
          curl -s https://www.cloudflare.com/ips-v6 -o /tmp/cloudflare-ips-v6.new.txt

          # Check if old files exist and compare
          if [ -f /tmp/cloudflare-ips-v4.txt ] && [ -f /tmp/cloudflare-ips-v6.txt ]; then
            if diff -q /tmp/cloudflare-ips-v4.txt /tmp/cloudflare-ips-v4.new.txt >/dev/null && \
               diff -q /tmp/cloudflare-ips-v6.txt /tmp/cloudflare-ips-v6.new.txt >/dev/null; then
              echo "No changes in Cloudflare IP ranges. Exiting..."
              rm /tmp/cloudflare-ips-v4.new.txt /tmp/cloudflare-ips-v6.new.txt
              exit 0
            fi
          fi

          # Move new files to replace old ones
          mv /tmp/cloudflare-ips-v4.new.txt /tmp/cloudflare-ips-v4.txt
          mv /tmp/cloudflare-ips-v6.new.txt /tmp/cloudflare-ips-v6.txt

          # Reset UFW to clear existing rules
          sudo ufw --force reset

          # Set default policies
          sudo ufw default deny incoming
          sudo ufw default allow outgoing

          # Allow SSH connections
          sudo ufw allow OpenSSH

          # Allow HTTP and HTTPS traffic from Cloudflare IPs
          while read -r ip; do
            #sudo ufw allow from "$ip" to any port 80 proto tcp
            sudo ufw allow from "$ip" to any port 443 proto tcp
          done < /tmp/cloudflare-ips-v4.txt

          while read -r ip; do
            #sudo ufw allow from "$ip" to any port 80 proto tcp
            sudo ufw allow from "$ip" to any port 443 proto tcp
          done < /tmp/cloudflare-ips-v6.txt

          # Enable UFW
          sudo ufw --force enable

          # Verify UFW status
          sudo ufw status verbose
        dest: /usr/local/bin/configure-ufw.sh
        mode: '0755'

    - name: Execute UFW configuration script (first run)
      command: /usr/local/bin/configure-ufw.sh

    - name: Schedule daily UFW configuration update
      cron:
        name: "Update UFW Cloudflare rules"
        job: "/usr/local/bin/configure-ufw.sh"
        hour: "0"
        minute: "0"
        user: root

    - name: Clone sharpr.me repository
      git:
        repo: https://github.com/digidubae/sharpr.me.git
        dest: /opt/sharpr.me
        version: main
      become_user: "{{ ansible_user }}"

    - name: Run docker compose up with the locally loaded image
      command: "docker compose --env-file ~/.env up -d"
      args:
        chdir: /opt/sharpr.me 